<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&family=Karla:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
</head>

<body class="p-4">

    <div class="form-check form-switch mb-3">
        <input class="form-check-input" type="checkbox" id="themeSwitch">
        <label class="form-check-label" for="themeSwitch">Dark Mode</label>
    </div>

    <div class="my-box">
        <h3 id="title">Generate a</h3>
        <h3 id="title2"> random password</h3>
        <h2 id="subtitle">Never use an insecure password again.</h2>
        <button id="generate-btn" onclick="generatePsw()">Generate passwords</button>
        <div id="line"></div>
        <div class="my-box2" id="box2">
            <div class="psw" id="psw1">-----</div>
            <div class="psw" id="psw2">-----</div>

        </div>
    </div>

</body>

</html>
